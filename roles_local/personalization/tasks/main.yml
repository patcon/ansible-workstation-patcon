---
- name: Configure git user name
  community.general.git_config:
    name: user.name
    scope: global
    value: "{{ personalization_git_name }}"
  become: true
  become_user: "{{ personalization_user }}"

- name: Configure git user email
  community.general.git_config:
    name: user.email
    scope: global
    value: "{{ personalization_git_email }}"
  become: true
  become_user: "{{ personalization_user }}"

- name: Ensure ~/repos directory exists
  file:
    path: "{{ personalization_repos_dir }}"
    state: directory
    owner: "{{ personalization_user }}"
    group: "{{ personalization_user }}"
    mode: '0755'

- name: Clone personal repos
  git:
    repo: "{{ item }}"
    dest: "{{ personalization_repos_dir }}/{{ item | split('/') | last | regex_replace('\\.git$', '') }}"
    accept_hostkey: true
  become: true
  become_user: "{{ personalization_user }}"
  loop: "{{ personalization_repos }}"
