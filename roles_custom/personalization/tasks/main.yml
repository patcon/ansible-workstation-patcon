---
- name: Ensure ~/.bashrc.d directory exists
  file:
    path: "/home/{{ workstation_user }}/.bashrc.d"
    state: directory
    owner: "{{ workstation_user }}"
    group: "{{ workstation_user }}"
    mode: '0755'
  become: true
  become_user: root

- name: Ensure ~/.bashrc sources ~/.bashrc.d/
  blockinfile:
    path: "/home/{{ workstation_user }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK: bashrc.d"
    block: |
      for f in ~/.bashrc.d/*.sh; do source "$f"; done
    create: true
    owner: "{{ workstation_user }}"
    group: "{{ workstation_user }}"
    mode: '0644'
  become: true
  become_user: root

- name: Set SSH login starting directory to ansible-workstation-patcon
  copy:
    dest: "/home/{{ workstation_user }}/.bashrc.d/ssh-start-dir.sh"
    content: |
      if [[ -n "$SSH_CONNECTION" ]] && [[ $- == *i* ]]; then
        cd ~/repos/ansible-workstation-patcon
      fi
    owner: "{{ workstation_user }}"
    group: "{{ workstation_user }}"
    mode: '0644'
  become: true
  become_user: root

- name: Ensure ~/.local/bin exists
  file:
    path: "/home/{{ workstation_user }}/.local/bin"
    state: directory
    owner: "{{ workstation_user }}"
    group: "{{ workstation_user }}"
    mode: '0755'
  become: true
  become_user: root

- name: Install repo-salvage script
  copy:
    src: repo-salvage
    dest: "/home/{{ workstation_user }}/.local/bin/repo-salvage"
    owner: "{{ workstation_user }}"
    group: "{{ workstation_user }}"
    mode: '0755'
  become: true
  become_user: root

- name: Install nvm
  shell: curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/{{ nvm_version }}/install.sh | bash
  args:
    creates: "/home/{{ workstation_user }}/.nvm/nvm.sh"
  become: true
  become_user: "{{ workstation_user }}"

- name: Install Node.js LTS via nvm
  shell: |
    export NVM_DIR="/home/{{ workstation_user }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    nvm install --lts
  args:
    creates: "/home/{{ workstation_user }}/.nvm/alias/default"
  become: true
  become_user: "{{ workstation_user }}"

- name: Install pnpm via official install script
  shell: curl -fsSL https://get.pnpm.io/install.sh | sh -
  args:
    creates: "/home/{{ workstation_user }}/.local/share/pnpm/bin/pnpm"
  become: true
  become_user: "{{ workstation_user }}"

- name: Configure git user name
  community.general.git_config:
    name: user.name
    scope: global
    value: "{{ personalization_git_name }}"
  become: true
  become_user: "{{ workstation_user }}"

- name: Configure git user email
  community.general.git_config:
    name: user.email
    scope: global
    value: "{{ personalization_git_email }}"
  become: true
  become_user: "{{ workstation_user }}"

