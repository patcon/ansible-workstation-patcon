---
- hosts: all
  become: true
  pre_tasks:
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600
      become: true

    # Ubuntu 26.04 ships without /etc/sysctl.conf; dev-sec.os-hardening requires it
    - name: Ensure /etc/sysctl.conf exists
      file:
        path: /etc/sysctl.conf
        state: touch
        owner: root
        group: root
        mode: '0440'
        modification_time: preserve
        access_time: preserve
      become: true
  roles:
    - role: bootstrap
      tags: bootstrap
    - role: dev-sec.os-hardening
      tags: hardening
      vars:
        sysctl_overwrite:
          # Docker requires IP forwarding to route external traffic into containers
          net.ipv4.ip_forward: 1
    - role: dev-sec.ssh-hardening
      tags: hardening
      vars:
        ssh_allow_agent_forwarding: true
        ssh_server_permit_environment_vars: 'yes'
        ssh_server_accept_env_vars: 'CLAUDE_CODE_OAUTH_TOKEN GITHUB_TOKEN'
    - role: github_cli
      tags: personalization
    - role: claude_cli
      tags: personalization
    - role: personalization
      tags: personalization
    - role: geerlingguy.docker
    - role: flatnotes
  post_tasks:
    - name: Restart sshd after ssh-hardening
      service:
        name: sshd
        state: restarted
      become: true
      tags: hardening

# Repo cloning runs in a separate play as patcon so SSH agent forwarding
# works natively (become_user doesn't inherit SSH_AUTH_SOCK from root).
- hosts: all
  remote_user: "{{ workstation_user }}"
  become: false
  gather_facts: false
  tags: personalization
  vars_files:
    - ../roles_custom/personalization/defaults/main.yml
  tasks:
    - name: Ensure ~/repos directory exists
      file:
        path: "{{ personalization_repos_dir }}"
        state: directory
        mode: '0755'

    - name: Clone personal repos
      git:
        repo: "{{ item }}"
        dest: "{{ personalization_repos_dir }}/{{ item | split('/') | last | regex_replace('\\.git$', '') }}"
        accept_hostkey: true
        update: false
      loop: "{{ personalization_repos }}"

    - name: Install homeshick
      git:
        repo: https://github.com/andsens/homeshick.git
        dest: "/home/{{ workstation_user }}/.homesick/repos/homeshick"
        accept_hostkey: true
        update: false

    - name: Register dotfiles-pub castle with homeshick
      file:
        src: "{{ personalization_repos_dir }}/dotfiles-pub"
        dest: "/home/{{ workstation_user }}/.homesick/repos/dotfiles-pub"
        state: link

    - name: Install homeshick wrapper script
      copy:
        dest: "/home/{{ workstation_user }}/.local/bin/homeshick"
        mode: '0755'
        content: |
          #!/usr/bin/env bash
          source ~/.homesick/repos/homeshick/homeshick.sh
          homeshick "$@"

    - name: Initialize dotfiles-pub git submodules recursively
      command: git submodule update --init --recursive
      args:
        chdir: "{{ personalization_repos_dir }}/dotfiles-pub"
      changed_when: false

    - name: Pre-create editorconfig-core-py directory for homeshick
      file:
        path: "/home/{{ workstation_user }}/.janus/editorconfig/plugin/editorconfig-core-py/editorconfig"
        state: directory
        mode: '0755'

    - name: Link dotfiles via homeshick
      shell: |
        source /home/{{ workstation_user }}/.homesick/repos/homeshick/homeshick.sh
        homeshick link --skip dotfiles-pub
      args:
        executable: /bin/bash
      changed_when: false

    - name: Install oh-my-zsh
      shell: sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
      environment:
        KEEP_ZSHRC: "yes"
      args:
        creates: "/home/{{ workstation_user }}/.oh-my-zsh"
