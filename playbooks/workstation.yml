---
- hosts: workstation
  become: true
  pre_tasks:
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600
      become: true

    # Ubuntu 26.04 ships without /etc/sysctl.conf; dev-sec.os-hardening requires it
    - name: Ensure /etc/sysctl.conf exists
      file:
        path: /etc/sysctl.conf
        state: touch
        owner: root
        group: root
        mode: '0440'
        modification_time: preserve
        access_time: preserve
      become: true
  roles:
    - role: bootstrap
      tags: bootstrap
    - role: dev-sec.os-hardening
      tags: hardening
    - role: dev-sec.ssh-hardening
      tags: hardening
      vars:
        ssh_allow_agent_forwarding: true
        ssh_server_permit_environment_vars: 'yes'
        ssh_server_accept_env_vars: 'CLAUDE_CODE_OAUTH_TOKEN GITHUB_TOKEN'
    - role: github_cli
      tags: personalization
    - role: personalization
      tags: personalization
